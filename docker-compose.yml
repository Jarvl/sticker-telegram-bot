version: '3.8'

services:
  telegram-sticker-bot:
    build: .
    container_name: telegram-sticker-bot
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m sticker_telegram_bot.main"
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    container_name: telegram-sticker-bot-postgres
    environment:
      - POSTGRES_USER=sticker_bot
      - POSTGRES_PASSWORD=sticker_bot
      - POSTGRES_DB=sticker_bot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sticker_bot -d sticker_bot"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: